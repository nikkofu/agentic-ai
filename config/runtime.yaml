models:
  default: "qwen/qwen3.6-plus:free"
  byAgentRole:
    planner: "qwen/qwen3.6-plus:free"
    researcher: "qwen/qwen3.6-plus:free"
    coder: "qwen/qwen3.6-plus:free"
    writer: "qwen/qwen3.6-plus:free"

reasoner:
  default: "medium"
  byAgentRole:
    planner: "high"
    researcher: "high"
    coder: "medium"
    writer: "low"

scheduler:
  defaultPolicy: "bfs"
  policyOverrides: {}

guardrails:
  maxDepth: 4
  maxBranch: 3
  maxSteps: 60
  maxBudget: 5.0

evaluator:
  weights:
    quality: 0.6
    cost: 0.2
    latency: 0.2
