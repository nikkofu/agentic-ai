models:
  default: "nvidia/nemotron-3-super-120b-a12b:free"
  fallback: ["nvidia/nemotron-3-super-120b-a12b:free"]
  by_agent_role:
    planner: "nvidia/nemotron-3-super-120b-a12b:free"
    researcher: "nvidia/nemotron-3-super-120b-a12b:free"
    coder: "nvidia/nemotron-3-super-120b-a12b:free"
    writer: "nvidia/nemotron-3-super-120b-a12b:free"

reasoner:
  default: "medium"
  by_agent_role:
    planner: "high"
    researcher: "high"
    coder: "medium"
    writer: "low"

scheduler:
  default_policy: "bfs"
  policy_overrides: {}
  rate_limit:
    requests_per_minute: 60
    burst_capacity: 5

guardrails:
  max_depth: 4
  max_branch: 3
  max_steps: 60
  max_budget: 5.0

evaluator:
  weights:
    quality: 0.6
    cost: 0.2
    latency: 0.2

retry:
  max_retries: 3
  base_delay_ms: 1000

mcp_servers: {}
