models:
  default: "qwen/qwen3.6-plus:free"
  fallback:
    - "qwen/qwen3.6-plus:free"
  by_agent_role:
    planner: "qwen/qwen3.6-plus:free"
    researcher: "qwen/qwen3.6-plus:free"
    coder: "qwen/qwen3.6-plus:free"
    writer: "qwen/qwen3.6-plus:free"

reasoner:
  default: "medium"
  by_agent_role:
    planner: "high"
    researcher: "high"
    coder: "medium"
    writer: "low"

scheduler:
  default_policy: "bfs"
  policy_overrides: {}
  rate_limit:
    requests_per_minute: 60
    burst_capacity: 5

guardrails:
  max_depth: 4
  max_branch: 4
  max_steps: 80
  max_budget: 10.0

evaluator:
  weights:
    quality: 0.65
    cost: 0.2
    latency: 0.15

retry:
  max_retries: 3
  base_delay_ms: 1000

mcp_servers:
  brave_search:
    command: "npx"
    args:
      - "-y"
      - "@modelcontextprotocol/server-brave-search"
    env:
      BRAVE_API_KEY: "${BRAVE_API_KEY}"
